name: workflow2
on: push
jobs:
  checkout: 
    runs-on: ubuntu-latest
    steps: 
      - name: checkout
        uses: actions/checkout@v4
  setup:
    runs-on: ubuntu-latest
    needs: checkout
    steps:
      - name: Setup-node.js
        uses: actions/setup-node@v4
  lint:
    runs-on: ubuntu-latest
    needs: setup
    steps: 
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: install dependecies
        run: npm install
      
      - name: Run Lint
        run: npm run lint
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: install dependecies
        run: npm install
      
      - name: Run Test
        run: npm test
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: install dependecies
        run: npm install
      
      - name: Build Application
        run: npm run build
        
